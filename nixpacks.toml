[phases.setup]
# postgresql_18 để có pg_dump match server version (Railway Postgres 18.x).
# pg_dump cũ hơn server → từ chối dump. Update con số này khi Railway nâng cấp PG.
nixPkgs = ["nodejs_20", "postgresql_18"]

[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm ci --prefix frontend --include=dev",
  "npm run build --prefix frontend",
  "npm ci --prefix backend --omit=dev"
]

[start]
cmd = "npm start"
