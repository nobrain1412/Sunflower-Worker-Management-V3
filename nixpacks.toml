[phases.setup]
# postgresql để có binary `pg_dump` cho backup trước migration (utils/backup.js)
nixPkgs = ["nodejs_20", "postgresql"]

[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm ci --prefix frontend --include=dev",
  "npm run build --prefix frontend",
  "npm ci --prefix backend --omit=dev"
]

[start]
cmd = "npm start"
